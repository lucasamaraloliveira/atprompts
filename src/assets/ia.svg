<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <defs>
    <!-- Gradient for app icon background -->
    <linearGradient id="icon-bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#3730a3" />
    </linearGradient>
    
    <!-- Soft shadow for the inner elements -->
    <filter id="drop-sh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- App Icon Base -->
  <rect x="5" y="5" width="90" height="90" rx="24" fill="url(#icon-bg-grad)" />

  <!-- Abstract Terminal Prompt >_ -->
  <path d="M28,34 L48,50 L28,66" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#drop-sh)" />
  <line x1="56" y1="66" x2="74" y2="66" stroke="#ffffff" stroke-width="7" stroke-linecap="round" filter="url(#drop-sh)" />

  <!-- Magic Sparkles (AI indicator) -->
  <path d="M72,22 C72,26.5 75.5,30 80,30 C75.5,30 72,33.5 72,38 C72,33.5 68.5,30 64,30 C68.5,30 72,26.5 72,22 Z" fill="#67e8f9" filter="url(#drop-sh)" />
  <path d="M22,70 C22,72 23.5,73.5 25,73.5 C23.5,73.5 22,75 22,77 C22,75 20.5,73.5 19,73.5 C20.5,73.5 22,72 22,70 Z" fill="#a5b4fc" opacity="0.8" />
</svg>